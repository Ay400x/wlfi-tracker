steps:
  # Step 1 — Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA', '.']

  # Step 2 — Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA']

  # Step 3 — Deploy to Cloud Run (simpler than GKE for first pipeline)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wlfi-tracker'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=cloud-build-runner@$PROJECT_ID.iam.gserviceaccount.com'

    secretEnv: ['ETHERSCAN_API_KEY']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/etherscan-api-key/versions/latest
      env: 'ETHERSCAN_API_KEY'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY