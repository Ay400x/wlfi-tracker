steps:
  # Step 1 — Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA', '.']

  # Step 2 — Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA']

  # Step 3 — Get the image digest for signing
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker inspect --format='{{index .RepoDigests 0}}' us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA > /workspace/image-digest.txt
        cat /workspace/image-digest.txt

  # Step 4 — Create attestation using KMS
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE_DIGEST=$(cat /workspace/image-digest.txt)
        gcloud container binauthz attestations sign-and-create \
          --artifact-url="$$IMAGE_DIGEST" \
          --attestor=wlfi-attestor \
          --attestor-project=$PROJECT_ID \
          --keyversion-project=$PROJECT_ID \
          --keyversion-location=us-central1 \
          --keyversion-keyring=binauthz-keyring \
          --keyversion-key=binauthz-key \
          --keyversion=1

  # Step 5 — Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wlfi-tracker'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--timeout=300'
      - '--service-account=cloud-build-runner@$PROJECT_ID.iam.gserviceaccount.com'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/wlfi-tracker/wlfi-tracker:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY